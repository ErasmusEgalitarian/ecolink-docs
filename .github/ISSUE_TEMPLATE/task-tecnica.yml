name: "🔧 Technical Task"
description: Infrastructure, refactoring, configuration or DevOps task (no direct User Story)
title: "[TASK][BE/FE/INFRA] Short title"
labels: ["task"]
body:
  - type: dropdown
    id: tipo
    attributes:
      label: "Task Type"
      options:
        - "🏗️ Refactoring"
        - "⚙️ Configuration / Setup"
        - "🔒 Security"
        - "📦 Dependency / Upgrade"
        - "🚀 CI/CD / DevOps"
        - "📝 Documentation"
        - "🧪 Testing"
        - "🗄️ Database / Migration"
    validations:
      required: true

  - type: dropdown
    id: epic
    attributes:
      label: "Related Epic (if applicable)"
      options:
        - "EP-001 — User Authentication & Profile Management"
        - "EP-002 — User Interface & Experience Design"
        - "EP-003 — EcoPoint Location & Discovery"
        - "EP-004 — QR Code Access & Kiosk Integration"
        - "EP-005 — Donation Registration & Validation"
        - "EP-010 — Backend Services & API"
        - "EP-011 — Frontend Architecture & State Management"
        - "EP-012 — Security & Data Protection"
        - "N/A — No related epic"

  - type: textarea
    id: objective
    attributes:
      label: "Objective"
      description: "What needs to be done and why?"
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: "Subtasks"
      placeholder: |
        - [ ] Install express-rate-limit
        - [ ] Configure limit of 100 req/15min per IP
        - [ ] Apply middleware to auth routes
        - [ ] Test with k6 or curl
    validations:
      required: true

  - type: input
    id: story_points
    attributes:
      label: "Estimate (hours or SP)"
      placeholder: "3h or 2 SP"

  - type: dropdown
    id: sprint
    attributes:
      label: "Sprint"
      options:
        - "Sprint 1"
        - "Sprint 2"
        - "Sprint 3"
        - "Sprint 4"
        - "Sprint 5"
        - "Sprint 6"
        - "Backlog (no sprint)"

name: "📋 User Story"
description: Implementation of a User Story from the MVP1 Backlog
title: "[US-XXX][BE/FE] Short title of the User Story"
labels: ["user-story"]
body:
  - type: markdown
    attributes:
      value: |
        > Fill in the fields below based on the backlog at `docs/project/product/mvp1-backlog.md`.
        > Also check the `EcoLink_Kanban.xlsx` spreadsheet for sprint and story point references.

  - type: input
    id: us_id
    attributes:
      label: "User Story ID"
      description: "Identifier in the format US-XXX (e.g. US-045)"
      placeholder: "US-XXX"
    validations:
      required: true

  - type: dropdown
    id: tipo
    attributes:
      label: "Type"
      description: "Backend, Frontend or both?"
      options:
        - BE — Backend
        - FE — Frontend
        - BE+FE — Full Stack
    validations:
      required: true

  - type: dropdown
    id: epic
    attributes:
      label: "Epic"
      options:
        - "EP-001 — User Authentication & Profile Management"
        - "EP-002 — User Interface & Experience Design"
        - "EP-003 — EcoPoint Location & Discovery"
        - "EP-004 — QR Code Access & Kiosk Integration"
        - "EP-005 — Donation Registration & Validation"
        - "EP-010 — Backend Services & API"
        - "EP-011 — Frontend Architecture & State Management"
        - "EP-012 — Security & Data Protection"
    validations:
      required: true

  - type: input
    id: feature
    attributes:
      label: "Feature"
      description: "Feature identifier (e.g. F-014)"
      placeholder: "F-XXX"
    validations:
      required: true

  - type: textarea
    id: user_story
    attributes:
      label: "User Story"
      description: "Format: As a [persona], I want [action] so that [benefit]"
      placeholder: "As a user at the EcoPoint, I want to register my donation in the system so that it is recorded"
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: "Acceptance Criteria"
      description: "List criteria in Gherkin format (Given/When/Then) or as a checklist"
      placeholder: |
        - [ ] Given the user is authenticated, when they submit the form, then the donation is saved to the database
        - [ ] Response returns HTTP 201 with the created object
        - [ ] Required fields validated (material, quantity)
        - [ ] Error message displayed if validation fails
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "Priority (MoSCoW)"
      options:
        - "🔴 Critical — Must Have"
        - "🟠 High — Should Have"
        - "🟡 Medium — Could Have"
        - "🟢 Low — Won't Have this cycle"
    validations:
      required: true

  - type: input
    id: story_points
    attributes:
      label: "Story Points"
      description: "Effort estimate (1, 2, 3, 5 or 8)"
      placeholder: "3"
    validations:
      required: true

  - type: dropdown
    id: sprint
    attributes:
      label: "Planned Sprint"
      options:
        - "Sprint 1"
        - "Sprint 2"
        - "Sprint 3"
        - "Sprint 4"
        - "Sprint 5"
        - "Sprint 6"
    validations:
      required: true

  - type: textarea
    id: technical_notes
    attributes:
      label: "Technical Notes"
      description: "Endpoints involved, models, components, dependencies on other USs"
      placeholder: |
        - Endpoint: POST /api/donation
        - Model: Pickup.js (Mongoose)
        - Depends on: US-046 BE (materialType enum)
        - Validation: Zod schema in donationSchemas.js

  - type: textarea
    id: definition_of_done
    attributes:
      label: "Definition of Done"
      description: "What needs to be done to consider this US complete?"
      value: |
        - [ ] Code implemented and reviewed (PR approved)
        - [ ] Unit tests written (minimum feature coverage)
        - [ ] Documentation updated (Swagger / README)
        - [ ] No lint errors
        - [ ] Tested in development environment
        - [ ] Kanban updated (`generate_kanban.py` re-run if needed)

  - type: input
    id: assignee_hint
    attributes:
      label: "Suggested Assignee"
      description: "Team member responsible (can be changed after creation)"
      placeholder: "@username"

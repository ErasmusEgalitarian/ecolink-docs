name: "🐛 Bug Report"
description: Report unexpected behavior or an error in the system
title: "[BUG][BE/FE] Short description of the problem"
labels: ["bug"]
body:
  - type: dropdown
    id: tipo
    attributes:
      label: "Affected Area"
      options:
        - BE — Backend (API / Database)
        - FE — Frontend (UI / React)
        - BE+FE — Both
    validations:
      required: true

  - type: input
    id: us_relacionada
    attributes:
      label: "Related User Story (if applicable)"
      placeholder: "US-XXX"

  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "Describe what is happening"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      placeholder: |
        1. Call POST /api/auth/login with a valid payload
        2. Observe the response
        3. The returned token has an invalid format
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "Expected Behavior"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: "Actual Behavior"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: "Logs / Stack Trace"
      description: "Paste the terminal error, browser console output or API response here"
      render: shell

  - type: dropdown
    id: severity
    attributes:
      label: "Severity"
      options:
        - "🔴 Critical — System inoperable / data corrupted"
        - "🟠 High — Main functionality broken"
        - "🟡 Medium — Degraded functionality, workaround exists"
        - "🟢 Low — Cosmetic / minor"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: "Environment"
      placeholder: "local dev / staging / Node 20 / MongoDB 7 / Chrome 122"
